<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador TSJE - Internas ANR 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, Helvetica, sans-serif;
  background: #a8a8a8;
  text-transform: uppercase;
  color: #000;
  user-select: none;
}
.simulator {
  max-width: 1200px;
  margin: 0 auto;
  background: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}
header {
  background: #5a5a5a;
  color: white;
  padding: 8px 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 75px;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-municipales {
  width: 65px;
  height: 65px;
  background: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #1a3d7c;
  font-size: 8px;
  font-weight: 900;
  line-height: 1.1;
  border: 2px solid #c00;
}
.header-center {
  flex: 1;
  text-align: center;
  font-size: 11px;
  line-height: 1.4;
  font-weight: bold;
  padding: 0 15px;
  letter-spacing: 0.3px;
}
.header-right {
  background: white;
  padding: 4px 12px;
  text-align: center;
  min-width: 80px;
}
.tsje-text {
  color: #003399;
  font-weight: 900;
  font-size: 26px;
  line-height: 1;
  letter-spacing: 1px;
}
.tsje-sub {
  font-size: 8px;
  color: #333;
  font-weight: bold;
  margin-top: -2px;
}
.title-bar {
  background: white;
  padding: 14px 20px 10px;
  text-align: center;
  border-bottom: 3px solid #d0d0d0;
}
.title-bar h1 {
  font-size: 22px;
  font-weight: bold;
  color: #000;
  letter-spacing: 0.5px;
}
#screen-subtitle {
  font-size: 16px;
  margin-top: 4px;
  font-weight: bold;
  color: #222;
  display: none;
}
main {
  flex: 1;
  padding: 25px 20px;
}
.grid-intendente {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  max-width: 980px;
  margin: 0 auto;
}
.card {
  background: #ffffff;
  border: 2px solid #b8b8b8;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.card:hover {
  border-color: #888;
}
.card.selected {
  border: 4px solid #0066cc !important;
  transform: scale(0.99);
}
.card-intendente {
  height: 185px;
  display: flex;
  flex-direction: column;
}
.card-header {
  text-align: center;
  padding: 7px 5px;
  font-size: 14px;
  font-weight: bold;
  border-bottom: 1px solid #ccc;
  background: #fafafa;
}
.card-body-int {
  flex: 1;
  display: flex;
  padding: 8px 10px;
  align-items: center;
  gap: 10px;
}
.candidate-photo {
  width: 95px;
  height: 115px;
  object-fit: cover;
  border: 1px solid #999;
  background: #eee;
  flex-shrink: 0;
}
.card-info {
  flex: 1;
  text-align: center;
}
.lista-grande {
  font-size: 34px;
  font-weight: 900;
  line-height: 1;
  color: #000;
}
.sigla {
  font-size: 17px;
  font-weight: bold;
  margin-top: 5px;
  color: #222;
}
.card-footer {
  text-align: center;
  padding: 7px 5px;
  font-size: 14px;
  font-weight: bold;
  border-top: 1px solid #ccc;
  background: #f5f5f5;
  min-height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.voto-blanco {
  height: 185px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: bold;
  text-align: center;
  padding: 20px;
}
.grid-listas {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  max-width: 1050px;
  margin: 0 auto;
}
.card-lista {
  height: 165px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  text-align: center;
}
.lista-num {
  font-size: 13px;
  font-weight: bold;
  text-align: left;
  margin-bottom: 5px;
}
.movimiento {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: bold;
  line-height: 1.25;
  padding: 5px 0;
}
.sigla-lista {
  font-size: 14px;
  font-weight: bold;
  padding-top: 5px;
  border-top: 1px solid #e0e0e0;
}
.grid-junta {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  max-width: 1100px;
  margin: 0 auto;
}
.card-junta {
  height: 150px;
  display: flex;
  flex-direction: column;
}
.junta-body {
  flex: 1;
  display: flex;
  padding: 8px;
  align-items: center;
  gap: 8px;
}
.junta-photo {
  width: 78px;
  height: 98px;
  object-fit: cover;
  border: 1px solid #999;
  background: #eee;
  flex-shrink: 0;
}
.opcion-num {
  flex: 1;
  text-align: center;
  font-size: 26px;
  font-weight: 900;
}
.junta-footer {
  padding: 6px 5px;
  font-size: 12px;
  font-weight: bold;
  text-align: center;
  border-top: 1px solid #ccc;
  background: #f7f7f7;
  min-height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1.2;
}
#screen4 {
  padding: 0 !important;
}
.resumen-wrapper {
  display: flex;
  min-height: 520px;
}
.resumen-panels {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
  padding: 25px;
  background: #e0e0e0;
}
.panel {
  background: white;
  border: 2px solid #b8b8b8;
  padding: 20px 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.panel-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 12px;
}
.panel-mov {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 4px;
}
.panel-lista {
  font-size: 15px;
  font-weight: bold;
  margin-bottom: 18px;
  color: #222;
}
.sel-box {
  width: 100%;
  max-width: 260px;
  background: #fff;
  border: 2px solid #b0b0b0;
  padding: 12px;
  margin-bottom: 15px;
}
.sel-box img {
  width: 110px;
  height: 135px;
  object-fit: cover;
  border: 1px solid #999;
  display: block;
  margin: 0 auto 10px;
}
.sel-nombre {
  font-size: 15px;
  font-weight: bold;
  line-height: 1.3;
}
.sel-opcion {
  font-size: 13px;
  margin-top: 3px;
  color: #333;
}
.btn-modificar {
  background: #e8e8e8;
  border: 2px solid #999;
  padding: 8px 35px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  font-size: 14px;
  margin-top: auto;
}
.btn-modificar:hover {
  background: #d8d8d8;
}
.panel-actions {
  width: 210px;
  background: #d5d5d5;
  display: flex;
  flex-direction: column;
  padding: 0;
  border-left: 3px solid #bbb;
}
.action-orange {
  background: #e67e22;
  color: white;
  border: none;
  padding: 22px 10px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  font-size: 14px;
  line-height: 1.3;
  border-bottom: 3px solid #bbb;
}
.action-orange:hover {
  background: #d35400;
}
.action-green {
  background: #27ae60;
  color: white;
  border: none;
  flex: 1;
  padding: 30px 10px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  font-size: 17px;
  line-height: 1.4;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.action-green:hover {
  background: #219653;
}
.icon-circle {
  font-size: 28px;
  line-height: 1;
}
.icon-print {
  font-size: 48px;
  line-height: 1;
}
footer {
  background: #cfcfcf;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 2px solid #aaa;
}
.btn-footer {
  background: linear-gradient(to bottom, #f8f8f8, #e0e0e0);
  border: 1px solid #888;
  padding: 9px 22px;
  cursor: pointer;
  font-weight: bold;
  text-transform: uppercase;
  font-size: 13px;
  border-radius: 3px;
  box-shadow: inset 0 1px 0 #fff;
}
.btn-footer:hover {
  background: linear-gradient(to bottom, #fff, #e8e8e8);
}
.high-contrast {
  filter: contrast(1.5) brightness(0.9);
}
.high-contrast .card,
.high-contrast .panel {
  border-width: 3px;
  border-color: #000 !important;
}
@media (max-width: 950px) {
  .grid-intendente { grid-template-columns: repeat(2, 1fr); }
  .grid-listas { grid-template-columns: repeat(3, 1fr); }
  .grid-junta { grid-template-columns: repeat(3, 1fr); }
  .resumen-panels { grid-template-columns: 1fr; }
  .panel-actions { width: 160px; }
}
@media (max-width: 640px) {
  .grid-intendente, .grid-listas, .grid-junta { grid-template-columns: 1fr; }
  .header-center { font-size: 9px; padding: 0 8px; }
  .resumen-wrapper { flex-direction: column; }
  .panel-actions { width: 100%; flex-direction: row; height: 100px; }
  .action-green { flex-direction: row; font-size: 14px; }
  header { flex-wrap: wrap; }
}
</style>
</head>
